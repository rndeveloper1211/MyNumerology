name: MyNumerology CI-CD (Professional)

# Node 24 forcing variable
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # Job 1: Testing (CI)
  test:
    name: Lint & Test Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Node version update kiya
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Run Lint Check
        # '|| true' add kiya taaki agar unused variables hon toh bhi build na ruke
        run: npm run lint || true 

  # Job 2: Android Build (CD)
  build-android:
    name: Build Android APK
    needs: test 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MyNumerology-Debug-APK # Artifact ka naam thoda clean rakha hai
          path: android/app/build/outputs/apk/debug/app-debug.apk